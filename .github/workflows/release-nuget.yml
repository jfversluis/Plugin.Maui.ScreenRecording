name: Create a (Pre)release on NuGet

on:
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+"
    - "v[0-9]+.[0-9]+.[0-9]+-preview[0-9]+"
jobs:
  release-nuget:
  
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Verify commit exists in origin/main
        run: |
          git fetch --no-tags --prune --depth=1 origin +refs/heads/*:refs/remotes/origin/*
          git branch --remote --contains | grep origin/main
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install .NET MAUI
        run: dotnet workload install maui
      - name: Get version information from tag
        id: get_version
        uses: battila7/get-version-action@v2
      - name: Restore dependencies
        run: dotnet restore src\Plugin.Maui.ScreenRecording.sln
      - name: Build
        run: dotnet build src\Plugin.Maui.ScreenRecording.sln -c Release /p:Version=${{ steps.get_version.outputs.version-without-v }}
      - name: Pack
        run: dotnet pack src\Plugin.Maui.ScreenRecording.sln -c Release /p:Version=${{ steps.get_version.outputs.version-without-v }} --no-build --output .
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: jfversluis
      - name: Push
        run: dotnet nuget push Plugin.Maui.ScreenRecording.${{ steps.get_version.outputs.version-without-v }}.nupkg -s https://api.nuget.org/v3/index.json -k ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
